# Kubernetes ConfigMap for Application Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-chatbot-config
data:
  backend-url: "http://ai-chatbot-backend-service:8085"
  cors-allowed-origins: "http://localhost:4200,http://localhost:80"
  openai-model: "gpt-3.5-turbo"
  openai-max-tokens: "500"
  openai-temperature: "0.7"
  openai-use-mock-mode: "true"
