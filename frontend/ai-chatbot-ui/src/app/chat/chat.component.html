<div class="chat-container">
  <div class="chat-header">
    <h1>🤖 AI Chatbot</h1>
    <p>Powered by OpenAI GPT-3.5-turbo</p>
  </div>

  <div class="chat-messages" #chatMessages>
    <div *ngFor="let message of messages" 
         [class]="message.isUser ? 'message user-message' : 'message ai-message'">
      <div class="message-avatar">
        {{ message.isUser ? '👤' : '🤖' }}
      </div>
      <div class="message-content">
        <p>{{ message.content }}</p>
        <span class="message-time">{{ message.timestamp | date:'short' }}</span>
      </div>
    </div>

    <div *ngIf="isLoading" class="message ai-message loading-message">
      <div class="message-avatar">🤖</div>
      <div class="message-content">
        <div class="typing-indicator">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="error" class="error-message" (click)="clearError()">
    ⚠️ {{ error }}
    <span class="close-error">×</span>
  </div>

  <div class="chat-input-container">
    <textarea 
      [(ngModel)]="userInput"
      (keypress)="onKeyPress($event)"
      [disabled]="isLoading"
      [maxlength]="maxLength"
      placeholder="Type your message... (Shift+Enter for new line)"
      class="chat-input"
      rows="1"
      autofocus
    ></textarea>
    <div class="input-footer">
      <span class="character-count" [class.near-limit]="isNearLimit">
        {{ characterCount }} / {{ maxLength }}
      </span>
      <button 
        (click)="sendMessage()" 
        [disabled]="!userInput.trim() || isLoading"
        class="send-button"
        type="button">
        {{ isLoading ? '⏳' : '📤 Send' }}
      </button>
    </div>
  </div>
</div>
