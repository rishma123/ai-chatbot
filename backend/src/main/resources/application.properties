# ============================================
# Server Configuration
# ============================================
server.port=8085
spring.application.name=ai-chatbot-backend

# ============================================
# CORS Configuration
# ============================================
# Allowed origins for CORS (comma-separated)
app.cors.allowed-origins=http://localhost:4200

# ============================================
# OpenAI Configuration
# ============================================
# IMPORTANT: Set OPENAI_API_KEY as an environment variable for security
# Windows: setx OPENAI_API_KEY "your-api-key-here"
# Linux/Mac: export OPENAI_API_KEY="your-api-key-here"
openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-3.5-turbo
openai.max.tokens=500
openai.temperature=0.7
# Set to false to use real OpenAI API, true for mock responses
openai.use-mock-mode=true

# ============================================
# Logging Configuration
# ============================================
logging.level.com.aichatbot=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ============================================
# Validation Configuration
# ============================================
# Exception handling is managed by GlobalExceptionHandler

